        stdev: 10
      - type : distance
        to: G
        val: 141.421356237
        stdev: 7
  - from: G
    obs:
      - type: angle
        bs: F
        fs: H
        val: 300.0000
        stdev: 10
      - type : distance
        to: H
        val: 141.421356237
        stdev: 7
