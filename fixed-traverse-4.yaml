# fixed traverse without orientaion
#

defaults:
  axes-xy: sw
  angles: left-handed
  angular: 400
  sigma-act: aposteriori
  sigma-apr: 10
  conf-pr: 0.90

description: Fixed traverse without orientation - 4 points, directions
   and angles (single straight line)

points:
  - id: A
    x:   0.000
    y:   0.000
    fix: xy
  - id: B
    # x:  100.001
    # y:    0.001
    adj: xy
  - id: C
    # x:  199.999
    # y:   -0.001
    adj: xy
  - id: Z
    x: 300.000
    y:   0.000
    fix: xy

observations:
  - from: B
    obs:
      - type: distance
        to: A
        val: 100.000
        stdev: 7
      - type: distance
        to: C
        val: 100.000
        stdev: 7
      - type: angle
        bs: A
        fs: C
        val: 200.000
        stdev: 10
  - from: C
    obs:
      - type: distance
        to: Z
        val: 100.000
        stdev: 7
      - type: angle
        bs: B
        fs: Z
        val: 200.000
        stdev: 10
